services:
    db:
        image: postgres:17-alpine
        container_name: architecture-mvp-db
        restart: unless-stopped
        environment:
            POSTGRES_USER: ${POSTGRES_USER:-mvp}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mvp}
            POSTGRES_DB: ${POSTGRES_DB:-mvp}
        ports:
            - "${POSTGRES_PORT:-5432}:5432"
        volumes:
            - architecture_mvp_pgdata:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mvp} -d ${POSTGRES_DB:-mvp}"]
            interval: 5s
            timeout: 5s
            retries: 10

volumes:
    architecture_mvp_pgdata:
